<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALS Bootsverleih – Sicherheits-Check & Regeln</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }
        .form-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #d32f2f; /* Deine rote Farbe */
            font-size: 24px;
            margin-bottom: 20px;
        }
        .intro-text {
            color: #555;
            font-size: 16px;
            margin-bottom: 20px;
        }
        label {
            display: flex;
            align-items: flex-start;
            margin-bottom: 15px;
            font-size: 16px;
            line-height: 1.5;
            color: #333;
        }
        input[type="checkbox"] {
            margin-right: 15px;
            margin-top: 5px;
            transform: scale(1.3);
        }
        .fees-list {
            margin-left: 30px;
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }
        .btn-submit {
            background-color: #d32f2f; /* Deine rote Farbe */
            color: #fff;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        .btn-submit:hover {
            background-color: #b71c1c;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h1>Sicherheits-Check & Regeln</h1>
    <p class="intro-text">Bitte bestätigen Sie die Einweisung kurz digital:</p>

    <form action="https://formspree.io/f/xvzdbyne" method="POST">
        <label>
            <input type="checkbox" name="einweisung" required>
            Ich habe die Einweisung (Motor, Wetter, Regeln) erhalten.
        </label>

        <label>
            <input type="checkbox" name="gebuehren" required>
            Ich akzeptiere die Gebühren:
        </label>
        <div class="fees-list">
            - WC-Verstopfung: 125 €<br>
            - Reinigung: ab 30 €
        </div>

        <label>
            <input type="checkbox" name="haftung" required>
            Ich hafte für Schäden am Boot und der Ausrüstung.
        </label>

        <button type="submit" class="btn-submit">Jetzt Bestätigen</button>
    </form>
</div>

</body>
</html>
