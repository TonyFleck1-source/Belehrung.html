<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALS Bootsverleih – Sicherheits-Einweisung</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #e9ecef;
            color: #333;
        }
        .form-container {
            max-width: 550px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h1 {
            color: #d32f2f;
            font-size: 26px;
            margin-top: 0;
            border-bottom: 2px solid #f4f4f4;
            padding-bottom: 10px;
        }
        .intro-text {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label.text-label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        label.checkbox-label {
            display: flex;
            align-items: flex-start;
            margin-bottom: 18px;
            font-size: 15px;
            cursor: pointer;
        }
        input[type="checkbox"] {
            margin-right: 15px;
            margin-top: 4px;
            min-width: 18px;
            min-height: 18px;
            cursor: pointer;
        }
        .fees-box {
            background-color: #fff8f8;
            border-left: 4px solid #d32f2f;
            padding: 15px;
            font-size: 14px;
            margin: -10px 0 20px 33px;
            color: #555;
        }
        .btn-submit {
            background-color: #d32f2f;
            color: #fff;
            border: none;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s ease;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background-color: #b71c1c;
        }
        footer {
            text-align: center;
            font-size: 12px;
            color: #888;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h1>Einweisung & Haftung</h1>
    <p class="intro-text">Ich bestätige, dass ich vor der Bootsübernahme ausführlich eingewiesen wurde und folgende Punkte verstehe und einhalte:</p>

    <form action="https://formspree.io/f/xvzdbyne" method="POST">
        
        <div class="input-group">
            <label class="text-label" for="name">Vollständiger Name (Kunde):</label>
            <input type="text" id="name" name="name" placeholder="Vorname Nachname" required>
        </div>

        <label class="checkbox-label">
            <input type="checkbox" name="einweisung_themen" required>
            <span>Ich habe die Einweisung zu <b>Wetter, Verkehrsregeln, Sicherheitsausrüstung und Motorbedienung</b> erhalten.</span>
        </label>

        <label class="checkbox-label">
            <input type="checkbox" name="gebuehren_akzeptiert" required>
            <span>Ich akzeptiere die Gebühren bei Rückgabe:</span>
        </label>
        <div class="fees-box">
            • Verstopfungsgebühr (z. B. WC): <b>125 €</b><br>
            • Normale Verschmutzung: <b>30 €</b><br>
            • Starke Verschmutzung: <b>90 €</b>
        </div>

        <label class="checkbox-label">
            <input type="checkbox" name="haftung_akzeptiert" required>
            <span>Ich bestätige den ordnungsgemäßen Zustand des Bootes und <b>hafte für alle Schäden</b> durch mich oder Mitfahrer.</span>
        </label>

        <button type="submit" class="btn-submit">Digital Unterschreiben</button>
    </form>
</div>

<footer>
    &copy; 2024 ALS Bootsverleih
</footer>

</body>
</html>
